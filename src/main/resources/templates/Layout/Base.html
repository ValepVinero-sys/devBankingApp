<!DOCTYPE html>
<!--
Base template (layout) for all application pages.

Contains:
- Common styles (Bootstrap, Font Awesome)
- Navigation bar (navbar)
- Footer
- Container for toast notifications
- Common JS functions (getToken, showToast, logout)

Dynamic fragments:
- ${content} — main page content (inserted from child templates)
- ${scripts} — page-specific scripts

Used in: index.html, dashboard.html, accounts/list.html, transfer/transfer.html, transactions.html
-->
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} ?: 'MyBank'">MyBank</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='0' y='14'>🏦</text></svg>">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <style>
    body {
        background-color: #f8f9fa;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .navbar-brand {
        font-weight: bold;
        font-size: 1.5rem;
    }
    .footer {
        margin-top: auto;
        background-color: #343a40;
        color: white;
        padding: 1rem 0;
        text-align: center;
    }
    .card-shadow {
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: transform 0.3s;
    }
    .card-shadow:hover {
        transform: translateY(-5px);
    }
    .balance-positive {
        color: #28a745;
        font-weight: bold;
    }
    .balance-negative {
        color: #dc3545;
        font-weight: bold;
    }
    .toast-container {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1050;
    }
  </style>
</head>
<body>
<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">
      <i class="fas fa-university me-2"></i>MyBank
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="/">
            <i class="fas fa-home"></i> Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/accounts">
            <i class="fas fa-credit-card"></i> Accpunts
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/transfer">
            <i class="fas fa-exchange-alt"></i> Transfer
          </a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
            <i class="fas fa-user"></i> <span id="userEmail">User</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#" onclick="logout()">
              <i class="fas fa-sign-out-alt"></i> Logout
            </a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Toast Container for Notifications -->
<div class="toast-container"></div>

<!-- Main Content -->
<main class="container mt-4">
  <div th:replace="${content} :: content"></div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="container">
    <span>&copy; 2026 MyBank. All rights reserved.</span>
  </div>
</footer>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Common JavaScript -->
<script>
  // Get token from localStorage
  function getToken() {
      return localStorage.getItem('jwtToken');
  }

  // Check if user is authenticated
  function isAuthenticated() {
      return getToken() !== null;
  }

  // Redirect to login if not authenticated
  function requireAuth() {
      if (!isAuthenticated()) {
          window.location.href = '/login';
          return false;
      }
      return true;
  }

  // Show toast notification
  /**
  * Displays a toast notification in the upper-right corner of the screen.
  *
  * @param {string} message - Notification text
  * @param {string} [type='success'] - Notification type: 'success' (green),
  * 'error' (red), 'info' (blue)
  *
  * @example
  * showToast('Transfer completed!', 'success');
  * showToast('Insufficient funds', 'error');
  * showToast('Loading...', 'info');
  */
  function showToast(message, type = 'success') {
      const toastContainer = document.querySelector('.toast-container');
      const toastId = 'toast-' + Date.now();
      const bgClass = type === 'success' ? 'bg-success' : (type === 'error' ? 'bg-danger' : 'bg-info');

      const toastHtml = `
          <div id="${toastId}" class="toast align-items-center text-white ${bgClass} border-0" role="alert">
              <div class="d-flex">
                  <div class="toast-body">${message}</div>
                  <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
              </div>
          </div>
      `;

      toastContainer.insertAdjacentHTML('beforeend', toastHtml);
      const toastElement = document.getElementById(toastId);
      const toast = new bootstrap.Toast(toastElement, { delay: 3000 });
      toast.show();

      toastElement.addEventListener('hidden.bs.toast', () => toastElement.remove());
  }

  // Logout function
  /**
  * Logs out: clears localStorage and redirects to /login.
  */
  function logout() {
      localStorage.removeItem('jwtToken');
      localStorage.removeItem('userEmail');
      showToast('Вы вышли из системы', 'info');
      setTimeout(() => {
          window.location.href = '/login';
      }, 1000);
  }

  // Load user info on page load
  document.addEventListener('DOMContentLoaded', function() {
      const userEmail = localStorage.getItem('userEmail');
      if (userEmail) {
          document.getElementById('userEmail').textContent = userEmail;
      }

      // Update nav based on auth status
      if (!isAuthenticated() && !window.location.pathname.includes('/login') && !window.location.pathname.includes('/register')) {
          if (window.location.pathname !== '/' && window.location.pathname !== '/login' && window.location.pathname !== '/register') {
              window.location.href = '/login';
          }
      }
  });
</script>

<!-- Page specific scripts -->
<th:block th:replace="${scripts} :: scripts"></th:block>

</body>
</html>
