<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>История операций - MyBank</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    }
    .card {
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    }
    .transaction-item {
    border-bottom: 1px solid #eee;
     padding: 15px;
      transition: background 0.3s;
     }
    .transaction-item:hover {
    background: #f8f9fa;
     }
    .transaction-amount.credit {
     color: #28a745;
     font-weight: bold;
     }
    .transaction-amount.debit {
     color: #dc3545;
     font-weight: bold;
     }
    .status-badge {
    font-size: 12px;
     padding: 3px 8px;
      border-radius: 20px;
     }
    .status-completed {
    background: #d4edda;
     color: #155724;
    }
    .status-pending {
    background: #fff3cd;
    color: #856404;
    }
    .status-failed {
    background: #f8d7da;
     color: #721c24;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">MyBank</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard">Главная</a></li>
        <li class="nav-item"><a class="nav-link" href="/accounts">Счета</a></li>
        <li class="nav-item"><a class="nav-link" href="/transfer">Перевод</a></li>
        <li class="nav-item"><a class="nav-link active" href="/transactions">История</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout">Выход</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0"><i class="fas fa-history me-2"></i>История операций</h4>
    </div>
    <div class="card-body">
      <!-- Фильтры -->
      <div class="row mb-3">
        <div class="col-md-4">
          <select id="accountFilter" class="form-select">
            <option value="">Все счета</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="typeFilter" class="form-select">
            <option value="">Все типы</option>
            <option value="TRANSFER">Переводы</option>
            <option value="DEPOSIT">Пополнения</option>
            <option value="WITHDRAWAL">Снятия</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="statusFilter" class="form-select">
            <option value="">Все статусы</option>
            <option value="COMPLETED">Выполнены</option>
            <option value="PENDING">В обработке</option>
            <option value="FAILED">Ошибки</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-primary w-100" onclick="loadTransactions()">
            <i class="fas fa-search me-1"></i>Фильтр
          </button>
        </div>
      </div>

      <!-- Список транзакций -->
      <div id="transactionsList">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Загрузка...</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let allTransactions = [];

  async function loadAccounts() {
      try {
          const response = await fetch('/api/accounts');
          if (response.ok) {
              const accounts = await response.json();
              const select = document.getElementById('accountFilter');
              accounts.forEach(account => {
                  select.innerHTML += `<option value="${account.accountNumber}">${account.accountNumber} - ${account.balance} ${account.currency}</option>`;
              });
          }
      } catch (error) {
          console.error('Error loading accounts:', error);
      }
  }

  async function loadTransactions() {
    const accountFilter = document.getElementById('accountFilter').value;
    const typeFilter = document.getElementById('typeFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    try {
        const accountsResponse = await fetch('/api/accounts');
        if (!accountsResponse.ok) throw new Error('Failed to load accounts');
        const accounts = await accountsResponse.json();

        let allTx = [];

        // Загружаем транзакции для каждого счета
        for (const account of accounts) {
            try {
                const txResponse = await fetch(`/api/transactions/account/${account.accountNumber}`);
                if (txResponse.ok) {
                    const transactions = await txResponse.json();
                    allTx.push(...transactions);
                }
            } catch (e) {
                console.log('No transactions for account:', account.accountNumber);
            }
        }

        // Если нет транзакций, показываем пустой список
        allTransactions = allTx;

        // Применяем фильтры
        let filtered = allTransactions;
        if (accountFilter) {
            filtered = filtered.filter(tx => tx.fromAccountNumber === accountFilter || tx.toAccountNumber === accountFilter);
        }
        if (typeFilter) {
            filtered = filtered.filter(tx => tx.type === typeFilter);
        }
        if (statusFilter) {
            filtered = filtered.filter(tx => tx.status === statusFilter);
        }

        renderTransactions(filtered);
    } catch (error) {
        console.error('Error loading transactions:', error);
        document.getElementById('transactionsList').innerHTML = `
            <div class="alert alert-warning text-center">
                <i class="fas fa-exclamation-triangle me-2"></i>
                Не удалось загрузить историю операций
            </div>
        `;
    }
}

  function getMockTransactions(accounts) {
      const mockTx = [];
      const now = new Date();

      if (accounts.length >= 2) {
          mockTx.push({
              id: 1,
              transactionId: 'TXN001',
              fromAccountNumber: accounts[0]?.accountNumber || '1234567890',
              toAccountNumber: accounts[1]?.accountNumber || '0987654321',
              amount: 5000,
              type: 'TRANSFER',
              status: 'COMPLETED',
              description: 'Перевод другу',
              createdAt: new Date(now.setHours(now.getHours() - 2)).toISOString(),
              fee: 0
          });
      }

      mockTx.push({
          id: 2,
          transactionId: 'TXN002',
          fromAccountNumber: null,
          toAccountNumber: accounts[0]?.accountNumber || '1234567890',
          amount: 10000,
          type: 'DEPOSIT',
          status: 'COMPLETED',
          description: 'Пополнение с карты',
          createdAt: new Date(now.setHours(now.getHours() - 24)).toISOString(),
          fee: 0
      });

      mockTx.push({
          id: 3,
          transactionId: 'TXN003',
          fromAccountNumber: accounts[0]?.accountNumber || '1234567890',
          toAccountNumber: null,
          amount: 1500,
          type: 'WITHDRAWAL',
          status: 'COMPLETED',
          description: 'Оплата интернета',
          createdAt: new Date(now.setHours(now.getHours() - 48)).toISOString(),
          fee: 0
      });

      return mockTx;
  }

  function renderTransactions(transactions) {
      const container = document.getElementById('transactionsList');

      if (transactions.length === 0) {
          container.innerHTML = `
              <div class="alert alert-info text-center">
                  <i class="fas fa-info-circle me-2"></i>Нет операций для отображения
              </div>
          `;
          return;
      }

      container.innerHTML = transactions.map(tx => {
          const isCredit = tx.type === 'DEPOSIT' || (tx.toAccountNumber && !tx.fromAccountNumber);
          const amount = parseFloat(tx.amount);
          const date = new Date(tx.createdAt);

          let typeIcon = '<i class="fas fa-exchange-alt"></i>';
          let typeText = 'Перевод';
          if (tx.type === 'DEPOSIT') {
              typeIcon = '<i class="fas fa-arrow-down text-success"></i>';
              typeText = 'Пополнение';
          } else if (tx.type === 'WITHDRAWAL') {
              typeIcon = '<i class="fas fa-arrow-up text-danger"></i>';
              typeText = 'Снятие';
          }

          let statusClass = '';
          let statusText = '';
          if (tx.status === 'COMPLETED') {
              statusClass = 'status-completed';
              statusText = 'Выполнен';
          } else if (tx.status === 'PENDING') {
              statusClass = 'status-pending';
              statusText = 'В обработке';
          } else {
              statusClass = 'status-failed';
              statusText = 'Ошибка';
          }

          return `
              <div class="transaction-item">
                  <div class="row align-items-center">
                      <div class="col-auto">
                          <div class="transaction-icon ${isCredit ? 'credit' : 'debit'}">
                              ${typeIcon}
                          </div>
                      </div>
                      <div class="col">
                          <div class="d-flex justify-content-between align-items-center flex-wrap">
                              <div>
                                  <strong>${typeText}</strong>
                                  <div class="small text-muted">${tx.description || 'Без описания'}</div>
                                  <div class="small text-muted">
                                      <i class="fas fa-calendar-alt me-1"></i>${date.toLocaleString('ru-RU')}
                                  </div>
                              </div>
                              <div class="text-end">
                                  <div class="transaction-amount ${isCredit ? 'credit' : 'debit'}">
                                      ${isCredit ? '+' : '-'} ${amount.toLocaleString()} ₽
                                  </div>
                                  <div>
                                      <span class="status-badge ${statusClass}">${statusText}</span>
                                  </div>
                              </div>
                          </div>
                          ${tx.fromAccountNumber && tx.toAccountNumber ? `
                              <div class="small text-muted mt-2">
                                  <i class="fas fa-arrow-right me-1"></i>Счёт: ${tx.fromAccountNumber} → ${tx.toAccountNumber}
                              </div>
                          ` : ''}
                          ${tx.transactionId ? `
                              <div class="small text-muted">
                                  <i class="fas fa-hashtag me-1"></i>ID: ${tx.transactionId}
                              </div>
                          ` : ''}
                      </div>
                  </div>
              </div>
          `;
      }).join('');
  }

  // Загрузка страницы
  loadAccounts();
  loadTransactions();
</script>
</body>
</html>
