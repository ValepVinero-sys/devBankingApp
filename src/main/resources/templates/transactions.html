<!DOCTYPE html>
<!--
Page: Operation (Transaction) History
URL: /transactions
Access: Authenticated users only

Features:
- Display all transfers and operations for the user
- Filter by:
* Account (sender/recipient)
* Operation type (transfer, deposit, withdrawal)
* Status (completed, error, processing)
- Color coding: green (+) — receipts, red (-) — debits
- Informative message if there are no transactions

Related APIs:
- GET /api/accounts — load accounts for the filter
- GET /api/transactions/account/{accountNumber} — load transactions by account

JavaScript functions:
- loadAccounts() — load accounts for the filter
- loadTransactions() — load and filter transactions
- renderTransactions(transactions) — display transactions
-->

<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Transfer history - MyBank</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='0' y='14'>🏦</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    }
    .card {
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    }
    .transaction-item {
    border-bottom: 1px solid #eee;
     padding: 15px;
      transition: background 0.3s;
     }
    .transaction-item:hover {
    background: #f8f9fa;
     }
    .transaction-amount.credit {
     color: #28a745;
     font-weight: bold;
     }
    .transaction-amount.debit {
     color: #dc3545;
     font-weight: bold;
     }
    .status-badge {
    font-size: 12px;
     padding: 3px 8px;
      border-radius: 20px;
     }
    .status-completed {
    background: #d4edda;
     color: #155724;
    }
    .status-pending {
    background: #fff3cd;
    color: #856404;
    }
    .status-failed {
    background: #f8d7da;
     color: #721c24;
    }
  </style>
</head>
<body>
<!--Navigation-->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">MyBank</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/accounts">Account's</a></li>
        <li class="nav-item"><a class="nav-link" href="/transfer">Transfer's</a></li>
        <li class="nav-item"><a class="nav-link active" href="/transactions">History</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout">Log-Out</a></li>
      </ul>
    </div>
  </div>
</nav>
<!--Cards-->
<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h4 class="mb-0"><i class="fas fa-history me-2"></i>Operation history</h4>
    </div>
    <div class="card-body">
      <!-- Filters -->
      <div class="row mb-3">
        <div class="col-md-4">
          <select id="accountFilter" class="form-select">
            <option value="">Accounts</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="typeFilter" class="form-select">
            <option value="">Types</option>
            <option value="TRANSFER">Transfers</option>
            <option value="DEPOSIT">Deposit</option>
            <option value="WITHDRAWAL">Withdraw</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="statusFilter" class="form-select">
            <option value="">Status</option>
            <option value="COMPLETED">Done</option>
            <option value="PENDING">Pending</option>
            <option value="FAILED">Error</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-primary w-100" onclick="loadTransactions()">
            <i class="fas fa-search me-1"></i>Filter
          </button>
        </div>
      </div>

      <!-- Transaction list -->
      <div id="transactionsList">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!--JavaScript-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function getToken() {
    return localStorage.getItem('jwtToken');
}
  let allTransactions = [];
 /**
 * Load list of bank accounts of current user from server
 * & show them on page.
 *
 * @async
 * @returns {Promise<void>}
 *
 * @throws {Error} If request are not authorized (redirect to /login)
 *
 * @example
 * await loadAccounts();
 */
  async function loadAccounts() {
    const token = getToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }
    try {
        const response = await fetch('/api/accounts', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (response.status === 401) {
            localStorage.removeItem('jwtToken');
            window.location.href = '/login';
            return;
        }
        if (response.ok) {
            const accounts = await response.json();
            const select = document.getElementById('accountFilter');
            accounts.forEach(account => {
                select.innerHTML += `<option value="${account.accountNumber}">${account.accountNumber} - ${account.balance} ${account.currency}</option>`;
            });
        }
    } catch (error) {
        console.error('Error loading accounts:', error);
    }
}
/**
* Loads the transaction history for all accounts of the current user,
* applies the selected filters, and displays the results.
*
* @async
* @function loadTransactions
* @returns {Promise<void>}
*
* @description
* Algorithm:
* 1. Gets all accounts of the user via GET /api/accounts.
* 2. Requests a transaction for each account via /api/transactions/account/{number}.
* 3. Combines the results into a single array.
* 4. Filters by the selected account, transaction type, and status (values ​​from <select>)
* 5. Calls renderTransactions() to display
*
* @throws {Error} If network connection is required or authorization is not available (redirect to /login)
*
* @example
* // Called when the page is created and filters are closed
* await loadTransactions();
*/
  async function loadTransactions() {
    const token = getToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }
    const accountFilter = document.getElementById('accountFilter').value;
    const typeFilter = document.getElementById('typeFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    try {
        const accountsResponse = await fetch('/api/accounts', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!accountsResponse.ok) throw new Error('Failed to load accounts');
        const accounts = await accountsResponse.json();

        let allTx = [];
        for (const account of accounts) {
            try {
                const txResponse = await fetch(`/api/transactions/account/${account.accountNumber}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (txResponse.ok) {
                    const transactions = await txResponse.json();
                    allTx.push(...transactions);
                }
            } catch (e) {
                console.log('No transactions for account:', account.accountNumber);
            }
        }

        let filtered = allTx;
        if (accountFilter) {
            filtered = filtered.filter(tx => tx.fromAccountNumber === accountFilter || tx.toAccountNumber === accountFilter);
        }
        if (typeFilter) {
            filtered = filtered.filter(tx => tx.type === typeFilter);
        }
        if (statusFilter) {
            filtered = filtered.filter(tx => tx.status === statusFilter);
        }

        renderTransactions(filtered);
    } catch (error) {
        console.error('Error loading transactions:', error);
        document.getElementById('transactionsList').innerHTML = `<div class="alert alert-warning text-center">Failed to load transaction history...</div>`;
    }
}

/**
* Renders a list of transactions on the history page.
*
* @param {Array<Object>} transactions - Array of transaction objects
* @param {number} transactions[].id - Transaction ID
* @param {string} transactions[].type - Type: 'TRANSFER', 'DEPOSIT', 'WITHDRAWAL'
* @param {string} transactions[].status - Status: 'COMPLETED', 'PENDING', 'FAILED'
* @param {number} transactions[].amount - Amount
* @param {string} [transactions[].description] - Description
* @param {string} transactions[].createdAt - Date in ISO format
*
* @returns {void}
*
* @description
* - For deposits (DEPOSIT), shows a green '+' and a down icon
* - For debits (WITHDRAWAL, TRANSFER), shows a red icon '-' and the up icon
* - The status is displayed with a colored badge
* - An empty array is replaced with the message "No operations"
*/
  function renderTransactions(transactions) {
      const container = document.getElementById('transactionsList');

      if (transactions.length === 0) {
          container.innerHTML = `
              <div class="alert alert-info text-center">
                  <i class="fas fa-info-circle me-2"></i>There wasnt any operation to show
              </div>
          `;
          return;
      }

      container.innerHTML = transactions.map(tx => {
          const isCredit = tx.type === 'DEPOSIT' || (tx.toAccountNumber && !tx.fromAccountNumber);
          const amount = parseFloat(tx.amount);
          const date = new Date(tx.createdAt);

          let typeIcon = '<i class="fas fa-exchange-alt"></i>';
          let typeText = 'Transfer';
          if (tx.type === 'DEPOSIT') {
              typeIcon = '<i class="fas fa-arrow-down text-success"></i>';
              typeText = 'Deposit';
          } else if (tx.type === 'WITHDRAWAL') {
              typeIcon = '<i class="fas fa-arrow-up text-danger"></i>';
              typeText = 'Withdrawal';
          }

          let statusClass = '';
          let statusText = '';
          if (tx.status === 'COMPLETED') {
              statusClass = 'status-completed';
              statusText = 'Completed';
          } else if (tx.status === 'PENDING') {
              statusClass = 'status-pending';
              statusText = ' Pending ';
          } else {
              statusClass = 'status-failed';
              statusText = 'Error';
          }

          return `
              <div class="transaction-item">
                  <div class="row align-items-center">
                      <div class="col-auto">
                          <div class="transaction-icon ${isCredit ? 'credit' : 'debit'}">
                              ${typeIcon}
                          </div>
                      </div>
                      <div class="col">
                          <div class="d-flex justify-content-between align-items-center flex-wrap">
                              <div>
                                  <strong>${typeText}</strong>
                                  <div class="small text-muted">${tx.description || 'No description'}</div>
                                  <div class="small text-muted">
                                      <i class="fas fa-calendar-alt me-1"></i>${date.toLocaleString('en-EN')}
                                  </div>
                              </div>
                              <div class="text-end">
                                  <div class="transaction-amount ${isCredit ? 'credit' : 'debit'}">
                                      ${isCredit ? '+' : '-'} ${amount.toLocaleString()} ₽
                                  </div>
                                  <div>
                                      <span class="status-badge ${statusClass}">${statusText}</span>
                                  </div>
                              </div>
                          </div>
                          ${tx.fromAccountNumber && tx.toAccountNumber ? `
                              <div class="small text-muted mt-2">
                                  <i class="fas fa-arrow-right me-1"></i>Счёт: ${tx.fromAccountNumber} → ${tx.toAccountNumber}
                              </div>
                          ` : ''}
                          ${tx.transactionId ? `
                              <div class="small text-muted">
                                  <i class="fas fa-hashtag me-1"></i>ID: ${tx.transactionId}
                              </div>
                          ` : ''}
                      </div>
                  </div>
              </div>
          `;
      }).join('');
  }

  // Loading page
  loadAccounts();
  loadTransactions();
</script>
</body>
</html>
