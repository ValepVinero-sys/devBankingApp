<!DOCTYPE html>
<!--
Page: Transfer funds between bank accounts
URL: /transfer
Access: Authenticated users only

Functionality:
- Select the account to be debited from (from the list of active accounts)
- Enter the recipient's account number
- Specify the payment amount and purpose
- Send POST to /api/accounts/transfer
- Display a notification about the result (success/error)
- Navigate via the navbar
-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Funds transfer - MyBank</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='0' y='14'>🏦</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">MyBank</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/dashboard">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/accounts">Accounts</a></li>
        <li class="nav-item"><a class="nav-link active" href="/transfer">Translation</a></li>
        <li class="nav-item"><a class="nav-link" href="/transactions">History</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout">Exit</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          <h4><i class="fas fa-exchange-alt me-2"></i>Transfer funds</h4>
        </div>
        <div class="card-body">
          <form id="transferForm">
            <div class="mb-3">
              <label class="form-label">Debit account</label>
              <select class="form-select" id="fromAccount" required>
                <option value="">Loading...</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Recipient's account</label>
              <input type="text" class="form-control" id="toAccountNumber" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Amount</label>
              <input type="number" step="0.01" class="form-control" id="amount" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Purpose</label>
              <textarea class="form-control" id="description" rows="2"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Transfer</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  /**
 * Load list of bank accounts of current user from server
 * & show them on page.
 *
 * @async
 * @returns {Promise<void>}
 *
 * @throws {Error} If request are not authorized (redirect to /login)
 *
 * @example
 * await loadAccounts();
 */
  async function loadAccounts() {
    const token = localStorage.getItem('jwtToken');
    if (!token) {
        window.location.href = '/login';
        return;
    }
    try {
        const response = await fetch('/api/accounts', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (response.status === 401 || response.status === 403) {
            localStorage.removeItem('jwtToken');
            window.location.href = '/login';
            return;
        }
        if (response.ok) {
            const accounts = await response.json();
            const select = document.getElementById('fromAccount');
            select.innerHTML = '<option value="">Select account...</option>';
            accounts.forEach(account => {
                if (account.active && parseFloat(account.balance) > 0) {
                    select.innerHTML += `<option value="${account.accountNumber}">${account.accountNumber} - ${account.balance} ${account.currency}</option>`;
                }
            });
        }
    } catch (error) {
        console.error('Error:', error);
    }
}

document.getElementById('transferForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = localStorage.getItem('jwtToken');
    if (!token) {
        window.location.href = '/login';
        return;
    }
    const fromAccount = document.getElementById('fromAccount').value;
    const toAccountNumber = document.getElementById('toAccountNumber').value;
    const amount = parseFloat(document.getElementById('amount').value);
    const description = document.getElementById('description').value;

    if (!fromAccount || !toAccountNumber || !amount) {
        alert('Fill in all fields');
        return;
    }

    try {
        const response = await fetch('/api/accounts/transfer', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ fromAccountNumber: fromAccount, toAccountNumber, amount, description })
        });
        if (response.ok) {
            alert('Transfer completed!');
            window.location.href = '/dashboard';
        } else if (response.status === 401) {
            localStorage.removeItem('jwtToken');
            window.location.href = '/login';
        } else {
            alert('Transfer error');
        }
    } catch (error) {
        alert('Connection error');
    }
});

  loadAccounts();
</script>
</body>
</html>
