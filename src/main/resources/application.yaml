spring:
  spring:
    jpa:
      hibernate:
        ddl-auto: create-drop  # или update для разработки
  application:
    name: Bank
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # Явно указываем схему (опционально)
    schemas: public
  datasource:
    url: jdbc:postgresql://localhost:5432/bankdb
    username: bankuser
    password: bankpass
    driver-class-name: org.postgresql.Driver